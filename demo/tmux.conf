# Minimal tmux config for the hydrate demo recording: a dark bar that shows only
# the hydrate water segment (read from the cache, exactly like a real setup).
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g status-left "#[fg=#6c7086] hydrate demo  "
set -g status-left-length 40
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-right '#(cat ${XDG_STATE_HOME:-$HOME/.local/state}/hydrate/segment 2>/dev/null)  '
set -g status-right-length 120
